name: release-desktop

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            args: "--target aarch64-apple-darwin"
            rust_targets: "aarch64-apple-darwin"
          - os: macos-latest
            args: "--target x86_64-apple-darwin"
            rust_targets: "x86_64-apple-darwin"
          - os: macos-latest
            args: "--target universal-apple-darwin"
            rust_targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - os: windows-latest
            args: "--target x86_64-pc-windows-msvc"
            rust_targets: "x86_64-pc-windows-msvc"
            
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./apps/desktop -> target"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Download Sparkle framework
        if: runner.os == 'macOS'
        run: bash ./apps/desktop/scripts/download-sparkle.sh

      - name: Build and release desktop bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: "v__VERSION__"
          releaseName: "IMS v__VERSION__"
          releaseBody: "Automated desktop build for IMS v__VERSION__."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  publish-sparkle-appcast:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-release
    runs-on: macos-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Download Sparkle tools
        run: |
          curl -L -o "$RUNNER_TEMP/sparkle.tar.xz" "https://github.com/sparkle-project/Sparkle/releases/download/2.8.1/Sparkle-2.8.1.tar.xz"
          tar -xf "$RUNNER_TEMP/sparkle.tar.xz" -C "$RUNNER_TEMP"

      - name: Download universal macOS release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p "$RUNNER_TEMP/release-assets"
          gh release download "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --pattern "*_universal.dmg" --dir "$RUNNER_TEMP/release-assets"

      - name: Export Sparkle private key
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          test -n "$SPARKLE_PRIVATE_KEY"
          printf '%s' "$SPARKLE_PRIVATE_KEY" > "$RUNNER_TEMP/sparkle_private_key.txt"

      - name: Fetch release metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --json tagName,name,body,publishedAt > "$RUNNER_TEMP/release.json"

      - name: Generate Sparkle appcast
        run: |
          node ./scripts/generate-sparkle-appcast.mjs \
            --repo "${GITHUB_REPOSITORY}" \
            --release-json "$RUNNER_TEMP/release.json" \
            --assets-dir "$RUNNER_TEMP/release-assets" \
            --output-dir "$RUNNER_TEMP/sparkle-pages" \
            --download-url-prefix "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/" \
            --sign-update "$RUNNER_TEMP/bin/sign_update" \
            --ed-key-file "$RUNNER_TEMP/sparkle_private_key.txt" \
            --minimum-system-version "10.15.0"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ runner.temp }}/sparkle-pages

      - name: Deploy Sparkle appcast
        uses: actions/deploy-pages@v4
