<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>面试管理</title>
  <style>
    :root {
      --bg: #f5f5f7;
      --surface: #ffffff;
      --primary: #007aff;
      --text: #1d1d1f;
      --text-secondary: #86868b;
      --border: #d2d2d7;
      --danger: #ff3b30;
      --success: #34c759;
      --warning: #ff9500;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    /* ── Layout ── */
    .app { display: flex; min-height: 100vh; }
    .sidebar {
      width: 220px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .sidebar-logo {
      padding: 20px 16px;
      font-size: 15px;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-nav { padding: 8px; flex: 1; }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      color: var(--text);
      text-decoration: none;
      transition: background 0.15s;
    }
    .nav-item:hover { background: var(--bg); }
    .nav-item.active { background: #007aff15; color: var(--primary); font-weight: 500; }
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .topbar {
      height: 52px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 12px;
    }
    .topbar-title { font-size: 14px; font-weight: 500; }
    .topbar-spacer { flex: 1; }
    .content { flex: 1; padding: 24px; overflow-y: auto; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-secondary { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
    .btn-danger { background: var(--danger); color: #fff; }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 20px;
      margin-bottom: 16px;
    }
    .card-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 12px;
    }

    /* ── Table ── */
    .table { width: 100%; border-collapse: collapse; }
    .table th, .table td {
      text-align: left;
      padding: 10px 12px;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
    }
    .table th { color: var(--text-secondary); font-weight: 500; }
    .table tr:hover td { background: var(--bg); }
    .table td a { color: var(--primary); cursor: pointer; }

    /* ── Forms ── */
    .form-group { margin-bottom: 14px; }
    .form-label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 5px; color: var(--text-secondary); }
    .form-input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }
    .form-input:focus { border-color: var(--primary); }
    textarea.form-input { resize: vertical; min-height: 80px; }

    /* ── Search bar ── */
    .search-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .search-input {
      flex: 1;
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 14px;
      outline: none;
      background: var(--surface);
    }
    .search-input:focus { border-color: var(--primary); }

    /* ── Tags ── */
    .tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      background: var(--bg);
      color: var(--text-secondary);
      border: 1px solid var(--border);
      margin: 2px;
    }

    /* ── Status badges ── */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 500;
    }
    .badge-green { background: #34c75920; color: var(--success); }
    .badge-yellow { background: #ff950020; color: var(--warning); }
    .badge-red { background: #ff3b3020; color: var(--danger); }
    .badge-gray { background: var(--bg); color: var(--text-secondary); }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: var(--surface);
      border-radius: 14px;
      padding: 24px;
      width: 480px;
      max-width: 90vw;
      max-height: 85vh;
      overflow-y: auto;
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .modal-title { font-size: 16px; font-weight: 600; }
    .modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-secondary); }
    .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

    /* ── Indicator ── */
    .indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }
    .indicator-green { background: var(--success); }
    .indicator-yellow { background: var(--warning); }
    .indicator-red { background: var(--danger); }
    .indicator-gray { background: var(--text-secondary); }

    /* ── Import progress ── */
    .progress-bar {
      height: 6px;
      background: var(--bg);
      border-radius: 3px;
      overflow: hidden;
      margin-top: 8px;
    }
    .progress-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 3px;
      transition: width 0.3s;
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
    }
    .empty-state p { font-size: 14px; margin-top: 8px; }

    /* ── Utility ── */
    .hidden { display: none !important; }
    .text-secondary { color: var(--text-secondary); }
    .text-sm { font-size: 12px; }
    .mt-8 { margin-top: 8px; }
    .mt-16 { margin-top: 16px; }
    .flex { display: flex; }
    .gap-8 { gap: 8px; }
    .items-center { align-items: center; }
  </style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">📋 面试管理</div>
    <nav class="sidebar-nav">
      <a class="nav-item active" data-page="candidates">👥 候选人</a>
      <a class="nav-item" data-page="import">📥 导入任务</a>
      <a class="nav-item" data-page="settings">⚙️ 设置</a>
    </nav>
  </aside>

  <!-- Main -->
  <main class="main">
    <header class="topbar">
      <span class="topbar-title" id="topbar-title">候选人</span>
      <div class="topbar-spacer"></div>
      <span id="sync-indicator" class="flex items-center gap-4">
        <span class="indicator indicator-gray"></span>
        <span class="text-sm text-secondary">未同步</span>
      </span>
    </header>
    <div class="content" id="content">
      <!-- Page content rendered here -->
    </div>
  </main>
</div>

<!-- Modal container -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title"></span>
      <button class="modal-close" id="modal-close">×</button>
    </div>
    <div id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<script>
"use strict";

// ─────────────────────────────────────────────────────────────────────────────
// API
// ─────────────────────────────────────────────────────────────────────────────

const API = "http://127.0.0.1:3000/api";

async function api(path, options = {}) {
  const res = await fetch(`${API}${path}`, {
    headers: { "Content-Type": "application/json" },
    ...options,
  });
  const json = await res.json();
  if (!json.success) throw new Error(json.error?.message || json.error?.code || "API error");
  return json.data;
}

// ─────────────────────────────────────────────────────────────────────────────
// Router
// ─────────────────────────────────────────────────────────────────────────────

const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => document.querySelectorAll(sel);

let currentPage = "candidates";

function navigate(page, params = {}) {
  currentPage = page;
  $$(".nav-item").forEach((el) => el.classList.toggle("active", el.dataset.page === page));
  $("#topbar-title").textContent = { candidates: "候选人", import: "导入任务", settings: "设置" }[page] || page;
  renderPage(page, params);
}

$$(".nav-item").forEach((el) => el.addEventListener("click", () => navigate(el.dataset.page)));

// ─────────────────────────────────────────────────────────────────────────────
// Render helpers
// ─────────────────────────────────────────────────────────────────────────────

function renderPage(page, params) {
  const content = $("#content");
  if (page === "candidates") renderCandidates(content, params);
  else if (page === "import") renderImport(content);
  else if (page === "settings") renderSettings(content);
}

function sourceBadge(source) {
  const map = { local: "本地", remote: "远程", hybrid: "混合" };
  return `<span class="badge ${source === "local" ? "badge-gray" : "badge-green"}">${map[source] || source}</span>`;
}

// ─────────────────────────────────────────────────────────────────────────────
// Candidates Page
// ─────────────────────────────────────────────────────────────────────────────

async function renderCandidates(container, params = {}) {
  container.innerHTML = `<div class="empty-state">加载中...</div>`;

  try {
    const data = await api("/candidates?pageSize=50");
    const items = data.items || data || [];

    container.innerHTML = `
      <div class="search-bar">
        <input class="search-input" id="search-input" placeholder="搜索姓名、岗位、手机、邮箱…" value="${params.search || ""}">
        <button class="btn btn-primary" id="btn-new-candidate">+ 新建候选人</button>
        <button class="btn btn-secondary" id="btn-import-file">📥 导入文件</button>
      </div>
      ${items.length === 0 ? `<div class="empty-state"><div style="font-size:40px">👥</div><p>暂无候选人</p></div>` : `
      <div class="card" style="padding:0;overflow:hidden">
        <table class="table">
          <thead><tr>
            <th>姓名</th><th>岗位</th><th>来源</th><th>面试轮次</th><th>更新时间</th><th>操作</th>
          </tr></thead>
          <tbody>
            ${items.map((c) => `
              <tr data-candidate-id="${c.id}">
                <td><a class="candidate-link" data-id="${c.id}">${esc(c.name)}</a></td>
                <td>${esc(c.position || "—")}</td>
                <td>${sourceBadge(c.source)}</td>
                <td class="text-secondary">—</td>
                <td class="text-secondary text-sm">${fmtTime(c.updatedAt)}</td>
                <td>
                  <button class="btn btn-secondary btn-sm" data-open-ws="${c.id}">🤖 AI工作台</button>
                  <button class="btn btn-secondary btn-sm" data-export="${c.id}">📤 导出</button>
                </td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      </div>
      `}`;

    // Search
    $("#search-input").addEventListener("input", debounce(async (e) => {
      const q = e.target.value.trim();
      const d = await api(`/candidates?search=${encodeURIComponent(q)}&pageSize=50`);
      renderCandidatesListOnly(container, d.items || d);
    }));

    // New candidate
    $("#btn-new-candidate").addEventListener("click", () => showNewCandidateModal());

    // Import file
    $("#btn-import-file").addEventListener("click", () => {
      const input = document.createElement("input");
      input.type = "file";
      input.accept = ".pdf,.png,.jpg,.jpeg,.webp,.zip";
      input.multiple = true;
      input.onchange = async () => {
        const paths = Array.from(input.files).map((f) => f.path || f.name);
        if (!paths.length) return;
        const batch = await api("/import/batches", {
          method: "POST",
          body: JSON.stringify({ paths, autoScreen: false }),
        });
        navigate("import");
      };
      input.click();
    });

    // Row links
    $$(".candidate-link").forEach((el) => el.addEventListener("click", () => renderCandidateDetail(container, el.dataset.id)));
    $$("[data-open-ws]").forEach((el) => el.addEventListener("click", () => openWorkspace(el.dataset.openWs)));
    $$("[data-export]").forEach((el) => el.addEventListener("click", () => exportCandidate(el.dataset.export)));

  } catch (err) {
    container.innerHTML = `<div class="empty-state"><p>加载失败: ${esc(err.message)}</p></div>`;
  }
}

function renderCandidatesListOnly(container, items) {
  const table = container.querySelector("table");
  if (!table) return;
  const tbody = table.querySelector("tbody");
  tbody.innerHTML = items.map((c) => `
    <tr data-candidate-id="${c.id}">
      <td><a class="candidate-link" data-id="${c.id}">${esc(c.name)}</a></td>
      <td>${esc(c.position || "—")}</td>
      <td>${sourceBadge(c.source)}</td>
      <td class="text-secondary">—</td>
      <td class="text-secondary text-sm">${fmtTime(c.updatedAt)}</td>
      <td>
        <button class="btn btn-secondary btn-sm" data-open-ws="${c.id}">🤖 AI工作台</button>
        <button class="btn btn-secondary btn-sm" data-export="${c.id}">📤 导出</button>
      </td>
    </tr>
  `).join("");
  $$(".candidate-link").forEach((el) => el.addEventListener("click", () => renderCandidateDetail(container, el.dataset.id)));
  $$("[data-open-ws]").forEach((el) => el.addEventListener("click", () => openWorkspace(el.dataset.openWs)));
  $$("[data-export]").forEach((el) => el.addEventListener("click", () => exportCandidate(el.dataset.export)));
}

// ─────────────────────────────────────────────────────────────────────────────
// Candidate Detail
// ─────────────────────────────────────────────────────────────────────────────

async function renderCandidateDetail(container, id) {
  container.innerHTML = `<div class="empty-state">加载中…</div>`;
  try {
    const data = await api(`/candidates/${id}`);
    const { candidate: c, resumes: res = [], interviews: ints = [], artifactsSummary = [], workspace } = data;

    container.innerHTML = `
      <div class="flex gap-8 items-center" style="margin-bottom:16px">
        <button class="btn btn-secondary" onclick="navigate('candidates')">← 返回</button>
        <h2 style="font-size:18px;font-weight:600">${esc(c.name)}</h2>
        ${sourceBadge(c.source)}
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <!-- 基本信息 -->
        <div class="card">
          <div class="card-title">基本信息</div>
          <div style="display:grid;grid-template-columns:80px 1fr;gap:8px;font-size:13px">
            <span class="text-secondary">岗位</span><span>${esc(c.position || "—")}</span>
            <span class="text-secondary">工作年限</span><span>${c.yearsOfExperience ? c.yearsOfExperience + "年" : "—"}</span>
            <span class="text-secondary">手机</span><span>${esc(c.phone || "—")}</span>
            <span class="text-secondary">邮箱</span><span>${esc(c.email || "—")}</span>
          </div>
          ${c.tags?.length ? `<div class="mt-8">${c.tags.map((t) => `<span class="tag">${esc(t)}</span>`).join("")}</div>` : ""}
        </div>

        <!-- AI 工作台 -->
        <div class="card">
          <div class="card-title">🤖 AI 工作台</div>
          ${workspace ? `
            <p class="text-secondary text-sm">状态: <span class="badge badge-green">活跃</span></p>
            <button class="btn btn-primary mt-8" data-open-ws="${c.id}">打开工作台</button>
          ` : `
            <p class="text-secondary text-sm">尚未创建工作台</p>
            <button class="btn btn-primary mt-8" data-open-ws="${c.id}">启动工作台</button>
          `}
        </div>

        <!-- 简历 -->
        <div class="card">
          <div class="card-title">📄 简历 (${res.length})</div>
          ${res.length === 0 ? `<p class="text-secondary text-sm">暂无简历</p>` : res.map((r) => `
            <div style="margin-bottom:8px">
              <div style="font-size:13px">${esc(r.fileName)}</div>
              <div class="text-secondary text-sm">${r.ocrConfidence ? `识别置信度: ${r.ocrConfidence}%` : ""}</div>
            </div>
          `).join("")}
        </div>

        <!-- 面试记录 -->
        <div class="card">
          <div class="card-title">📅 面试记录 (${ints.length})</div>
          ${ints.length === 0 ? `<p class="text-secondary text-sm">暂无面试记录</p>` : ints.map((i) => `
            <div style="margin-bottom:8px">
              <div style="font-size:13px">第 ${i.round} 轮</div>
              <div class="text-secondary text-sm">${fmtTime(i.scheduledAt)} · ${i.status}</div>
            </div>
          `).join("")}
          <button class="btn btn-secondary mt-8" data-add-interview="${c.id}">+ 添加面试</button>
        </div>
      </div>
    `;

    $$("[data-open-ws]").forEach((el) => el.addEventListener("click", () => openWorkspace(el.dataset.openWs)));

  } catch (err) {
    container.innerHTML = `<div class="empty-state"><p>加载失败: ${esc(err.message)}</p><button class="btn btn-secondary mt-8" onclick="navigate('candidates')">返回</button></div>`;
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// Import Page
// ─────────────────────────────────────────────────────────────────────────────

async function renderImport(container) {
  container.innerHTML = `<div class="empty-state">加载中…</div>`;
  try {
    const data = await api("/import/batches");
    const batches = data.items || [];

    container.innerHTML = `
      <div class="flex gap-8 items-center" style="margin-bottom:16px">
        <h2 style="font-size:16px;font-weight:600">导入任务</h2>
        <button class="btn btn-primary" id="btn-new-import">+ 新建导入</button>
      </div>
      ${batches.length === 0 ? `<div class="empty-state"><div style="font-size:40px">📥</div><p>暂无导入记录</p></div>` : batches.map((b) => `
        <div class="card">
          <div class="flex items-center gap-8">
            <div>
              <span class="badge ${b.status === "completed" ? "badge-green" : b.status === "failed" ? "badge-red" : b.status === "processing" ? "badge-yellow" : "badge-gray"}">${b.status}</span>
              <span class="text-secondary text-sm ml-8">${b.totalFiles} 个文件</span>
            </div>
            <div class="topbar-spacer"></div>
            <span class="text-secondary text-sm">${fmtTime(b.createdAt)}</span>
          </div>
          ${b.totalFiles > 0 ? `
          <div class="progress-bar">
            <div class="progress-fill" style="width:${Math.round((b.processedFiles / b.totalFiles) * 100)}%"></div>
          </div>
          <div class="text-secondary text-sm mt-8">
            已处理 ${b.processedFiles}/${b.totalFiles}，成功 ${b.successFiles}，失败 ${b.failedFiles}
          </div>
          ` : ""}
        </div>
      `).join("")}
    `;

    $("#btn-new-import")?.addEventListener("click", () => {
      const input = document.createElement("input");
      input.type = "file";
      input.accept = ".pdf,.png,.jpg,.jpeg,.webp,.zip";
      input.multiple = true;
      input.onchange = async () => {
        const paths = Array.from(input.files).map((f) => f.path || f.name);
        if (!paths.length) return;
        await api("/import/batches", {
          method: "POST",
          body: JSON.stringify({ paths, autoScreen: false }),
        });
        renderImport(container);
      };
      input.click();
    });

  } catch (err) {
    container.innerHTML = `<div class="empty-state"><p>加载失败: ${esc(err.message)}</p></div>`;
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// Settings Page
// ─────────────────────────────────────────────────────────────────────────────

async function renderSettings(container) {
  container.innerHTML = `<div class="empty-state">加载中…</div>`;
  try {
    const [authData, syncData, opencodeData] = await Promise.all([
      api("/auth/status"),
      api("/sync/status").catch(() => ({ enabled: false, intervalMs: 5000, lastSyncAt: null, lastError: null })),
      api("/system/opencode/status"),
    ]);

    container.innerHTML = `
      <div class="card">
        <div class="card-title">账户</div>
        ${authData.status === "valid" ? `
          <p>✅ 已登录: ${esc(authData.user?.name || "")}</p>
          <button class="btn btn-secondary mt-8" id="btn-logout">退出登录</button>
        ` : `
          <p class="text-secondary">未登录</p>
          <button class="btn btn-primary mt-8" id="btn-login">登录</button>
        `}
      </div>

      <div class="card">
        <div class="card-title">同步</div>
        <div class="flex items-center gap-8">
          <label class="flex items-center gap-8">
            <input type="checkbox" id="sync-toggle" ${syncData.enabled ? "checked" : ""}>
            开启自动同步
          </label>
        </div>
        <p class="text-secondary text-sm mt-8">
          ${syncData.lastSyncAt ? `上次同步: ${fmtTime(syncData.lastSyncAt)}` : "从未同步"}
          ${syncData.lastError ? `<br><span style="color:var(--danger)">错误: ${esc(syncData.lastError)}</span>` : ""}
        </p>
        <button class="btn btn-secondary mt-8" id="btn-sync-now">立即同步</button>
      </div>

      <div class="card">
        <div class="card-title">🤖 OpenCode AI 引擎</div>
        <div class="flex items-center gap-8">
          <span class="indicator ${opencodeData.running ? "indicator-green" : "indicator-gray"}"></span>
          <span>${opencodeData.running ? `运行中 (${opencodeData.baseUrl})` : "未运行"}</span>
        </div>
        ${!opencodeData.running ? `
          <button class="btn btn-primary mt-8" id="btn-start-opencode">启动引擎</button>
        ` : `
          <button class="btn btn-secondary mt-8" id="btn-stop-opencode">停止引擎</button>
        `}
      </div>
    `;

    $("#sync-toggle")?.addEventListener("change", async (e) => {
      await api("/sync/toggle", {
        method: "POST",
        body: JSON.stringify({ enabled: e.target.checked }),
      });
      renderSettings(container);
    });

    $("#btn-sync-now")?.addEventListener("click", async () => {
      try {
        await api("/sync/run", { method: "POST" });
        renderSettings(container);
      } catch (err) {
        alert("同步失败: " + err.message);
      }
    });

    $("#btn-start-opencode")?.addEventListener("click", async () => {
      await api("/system/opencode/start", { method: "POST" });
      renderSettings(container);
    });

    $("#btn-stop-opencode")?.addEventListener("click", async () => {
      await api("/system/opencode/stop", { method: "POST" });
      renderSettings(container);
    });

  } catch (err) {
    container.innerHTML = `<div class="empty-state"><p>加载失败: ${esc(err.message)}</p></div>`;
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// Workspace
// ─────────────────────────────────────────────────────────────────────────────

async function openWorkspace(candidateId) {
  try {
    const data = await api(`/candidates/${candidateId}/workspace`, { method: "POST" });
    window.open(data.url, "_blank");
  } catch (err) {
    alert("启动工作台失败: " + err.message);
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// Export
// ─────────────────────────────────────────────────────────────────────────────

async function exportCandidate(candidateId) {
  try {
    const data = await api("/share/export", {
      method: "POST",
      body: JSON.stringify({ candidateId }),
    });
    alert(`已导出: ${data.filePath}`);
  } catch (err) {
    alert("导出失败: " + err.message);
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// New Candidate Modal
// ─────────────────────────────────────────────────────────────────────────────

function showNewCandidateModal() {
  $("#modal-title").textContent = "新建候选人";
  $("#modal-body").innerHTML = `
    <div class="form-group">
      <label class="form-label">姓名 *</label>
      <input class="form-input" id="new-name" placeholder="候选人姓名">
    </div>
    <div class="form-group">
      <label class="form-label">手机号</label>
      <input class="form-input" id="new-phone" placeholder="13800000000">
    </div>
    <div class="form-group">
      <label class="form-label">邮箱</label>
      <input class="form-input" id="new-email" placeholder="example@company.com">
    </div>
    <div class="form-group">
      <label class="form-label">岗位</label>
      <input class="form-input" id="new-position" placeholder="前端工程师">
    </div>
    <div class="form-group">
      <label class="form-label">工作年限</label>
      <input class="form-input" id="new-years" type="number" placeholder="5">
    </div>
  `;
  $("#modal-footer").innerHTML = `
    <button class="btn btn-secondary" id="modal-cancel">取消</button>
    <button class="btn btn-primary" id="modal-confirm">创建</button>
  `;
  $("#modal-overlay").classList.add("show");
  $("#modal-cancel").addEventListener("click", closeModal);
  $("#modal-confirm").addEventListener("click", async () => {
    const name = $("#new-name").value.trim();
    if (!name) { alert("请填写姓名"); return; }
    try {
      await api("/candidates", {
        method: "POST",
        body: JSON.stringify({
          name,
          phone: $("#new-phone").value.trim() || undefined,
          email: $("#new-email").value.trim() || undefined,
          position: $("#new-position").value.trim() || undefined,
          yearsOfExperience: parseInt($("#new-years").value) || undefined,
        }),
      });
      closeModal();
      navigate("candidates");
    } catch (err) {
      alert("创建失败: " + err.message);
    }
  });
}

function closeModal() {
  $("#modal-overlay").classList.remove("show");
}

$("#modal-close").addEventListener("click", closeModal);
$("#modal-overlay").addEventListener("click", (e) => {
  if (e.target === $("#modal-overlay")) closeModal();
});

// ─────────────────────────────────────────────────────────────────────────────
// Utilities
// ─────────────────────────────────────────────────────────────────────────────

function esc(s) {
  if (s == null) return "";
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function fmtTime(ts) {
  if (!ts) return "—";
  return new Date(ts).toLocaleString("zh-CN", { month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" });
}

function debounce(fn, ms = 300) {
  let timer;
  return (...args) => {
    clearTimeout(timer);
    timer = setTimeout(() => fn(...args), ms);
  };
}

// Boot

navigate("candidates");
